name: EduEnroll CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # Ta linijka poniżej naprawi błąd ze screena, bo ignoruje konflikty wersji!
        run: npm install --legacy-peer-deps

      - name: Run Linter (WCAG & Style Check)
        run: npm run lint
