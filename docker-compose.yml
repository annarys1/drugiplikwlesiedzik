version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: eduenroll_postgres
    environment:
      POSTGRES_USER: eduenroll_user
      POSTGRES_PASSWORD: eduenroll_secure_password123
      POSTGRES_DB: eduenroll_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: